<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders | QuickBite</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">QuickBite</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav align-items-center" id="authLinks">
          <!-- Populated dynamically by script.js -->
        </ul>
      </div>
    </div>
  </nav>

  <div class="container my-5">
    <h2 class="fw-bold mb-4">Past Orders</h2>
    <div class="row">
      <div class="col-md-8 mx-auto" id="ordersContainer">
        <!-- Orders will be loaded here -->
        <p class="text-center text-muted">Loading orders...</p>
      </div>
    </div>
  </div>

  <!-- Cart Modal Structure -->
  <div class="modal fade" id="cartModal" tabindex="-1" aria-labelledby="cartModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content" style="border-radius: 16px; border: none; border-top: 6px solid var(--primary-color);">
        <div class="modal-header border-bottom-0 pb-0">
          <h5 class="modal-title fw-bold fs-4" id="cartModalLabel">Your Cart</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body py-4" id="cartItemsList">
          <!-- Cart items loaded here via script.js -->
        </div>
        <div class="modal-footer border-top-0 pt-0">
          <button type="button" class="btn btn-primary-custom w-100 fs-5 pb-2 pt-2" id="cartCheckoutBtn" onclick="placeOrder()">
            Checkout
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="mt-auto">
    <div class="container text-muted text-center pt-4 border-top">
      <p class="mb-0">© 2026 QuickBite. All Rights Reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
